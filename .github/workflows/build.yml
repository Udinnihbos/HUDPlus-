name: Build HUD Plus Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 9.2.0
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.2.0-bin.zip
          unzip -q gradle-9.2.0-bin.zip -d /opt/gradle
          echo "/opt/gradle/gradle-9.2.0/bin" >> $GITHUB_PATH

      - name: Build mod
        run: gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hudplus-1.0.0
          path: build/libs/hudplus-1.0.0.jar
          if-no-files-found: error